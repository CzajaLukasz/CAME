name: came
channels:
  - defaults
dependencies:
  - python=3.10  # Podbito z 3.7 na 3.10 dla obsługi nowego PyTorcha
  - pip
  - cython
  - pip:
    - numpy<2.0.0
    - numpy      # Usunięto starą wersję 1.21.6 (3.10 wymaga nowszego numpy)
    - pandas
    - scipy
    - scikit-learn
    - tqdm
    - pyyaml
    - matplotlib
    - seaborn
    - tensorboard
    - pillow
    - requests
    - imageio
    - imgaug